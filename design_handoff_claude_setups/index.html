<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>claude-setups · gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,700;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23F97316'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='white'%3E%7B%7D%3C/text%3E%3C/svg%3E">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // Tweakable defaults (parseable JSON between the markers)
    window.TWEAKS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "aesthetic": "playful"
    }/*EDITMODE-END*/;

    // Apply tweaks on boot, before React mounts (prevents flash)
    (function applyTweaks() {
      const saved = localStorage.getItem('claude-setups.tweaks');
      if (saved) {
        try { Object.assign(window.TWEAKS, JSON.parse(saved)); } catch (e) {}
      }
      document.documentElement.setAttribute('data-theme', window.TWEAKS.theme);
      document.documentElement.setAttribute('data-aesthetic', window.TWEAKS.aesthetic);
    })();
  </script>

  <script src="data/setups.js"></script>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/IndexPage.jsx"></script>
  <script type="text/babel" src="components/ViewPage.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // Parse hash route. #/ → index, #/setup/:slug → view
    function parseHash() {
      const h = window.location.hash.replace(/^#/, '');
      if (h.startsWith('/setup/')) return { name: 'view', slug: h.slice('/setup/'.length) };
      return { name: 'index' };
    }

    function applyTweak(key, value) {
      window.TWEAKS[key] = value;
      document.documentElement.setAttribute('data-' + key, value);
      localStorage.setItem('claude-setups.tweaks', JSON.stringify(window.TWEAKS));
      // persist to disk via host (if available)
      try {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
      } catch (e) {}
    }

    function Topbar({ onHome, theme, onToggleTheme }) {
      return (
        <header className="topbar">
          <div className="topbar-left" onClick={onHome}>
            <Logo />
            <div className="brand">
              claude-setups<span className="brand-sub"> / gallery</span>
            </div>
          </div>
          <div className="topbar-right">
            <a className="btn-ghost btn-ghost-sm" href="https://github.com/adhenawer/claude-setups" target="_blank" rel="noreferrer">
              {Icons.github} repo
            </a>
            <button className="iconbtn" onClick={onToggleTheme} aria-label="Alternar tema">
              {theme === 'dark' ? Icons.sun : Icons.moon}
            </button>
          </div>
        </header>
      );
    }

    function TweaksPanel({ visible, theme, aesthetic, setTheme, setAesthetic }) {
      if (!visible) return null;
      return (
        <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweak-row">
            <span className="tweak-label">Tema</span>
            <div className="tweak-seg">
              <button className={theme === 'light' ? 'is-active' : ''} onClick={() => setTheme('light')}>light</button>
              <button className={theme === 'dark' ? 'is-active' : ''} onClick={() => setTheme('dark')}>dark</button>
            </div>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Estética</span>
            <div className="tweak-seg">
              <button className={aesthetic === 'playful' ? 'is-active' : ''} onClick={() => setAesthetic('playful')}>playful</button>
              <button className={aesthetic === 'editorial' ? 'is-active' : ''} onClick={() => setAesthetic('editorial')}>editorial</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [route, setRoute] = useState(parseHash());
      const [theme, setThemeState] = useState(window.TWEAKS.theme);
      const [aesthetic, setAestheticState] = useState(window.TWEAKS.aesthetic);
      const [tweaksVisible, setTweaksVisible] = useState(false);

      useEffect(() => {
        const onHash = () => setRoute(parseHash());
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      // Edit mode integration
      useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setTweaksVisible(true);
          else if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const setTheme = useCallback((v) => { setThemeState(v); applyTweak('theme', v); }, []);
      const setAesthetic = useCallback((v) => { setAestheticState(v); applyTweak('aesthetic', v); }, []);
      const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');

      const onHome = () => { window.location.hash = '/'; };
      const onOpen = (slug) => { window.location.hash = '/setup/' + slug; };

      return (
        <>
          <Topbar onHome={onHome} theme={theme} onToggleTheme={toggleTheme} />
          <main data-screen-label={route.name === 'view' ? '02 Setup detail' : '01 Gallery'}>
            {route.name === 'view'
              ? <ViewPage slug={route.slug} onBack={onHome} />
              : <IndexPage onOpen={onOpen} />}
          </main>
          <footer className="footer">
            MIT · feito pela comunidade · <a href="https://github.com/adhenawer/claude-setups" target="_blank" rel="noreferrer">github.com/adhenawer/claude-setups</a>
          </footer>
          <TweaksPanel
            visible={tweaksVisible}
            theme={theme}
            aesthetic={aesthetic}
            setTheme={setTheme}
            setAesthetic={setAesthetic}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
